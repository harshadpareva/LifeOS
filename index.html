<!DOCTYPE html>
<html>
<head>
  <title>LifeOS</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0;
      font-size: 30px;
    }

    .header p {
      margin: 6px 0 0;
      color: #666;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }

    .card h2 {
      font-size: 18px;
      margin: 0 0 14px;
    }

    .task {
      padding: 12px 0;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .task:last-child {
      border-bottom: none;
    }

    .task-title {
      font-weight: bold;
    }

    .task-meta {
      font-size: 13px;
      color: #777;
      margin-top: 5px;
    }

    .completed .task-title {
      text-decoration: line-through;
      color: #777;
    }

    .summary {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
    }

    .button {
      display: block;
      text-align: center;
      background: #111;
      color: white;
      padding: 16px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: bold;
      margin-top: 20px;
      cursor: pointer;
    }

    .add-form {
      display: none;
      margin-top: 16px;
    }

    input, select {
      width: 100%;
      padding: 14px;
      margin-bottom: 10px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 15px;
      box-sizing: border-box;
    }

    .save-button {
      background: #111;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      width: 100%;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="header" style="text-align:center;">
      <h1 style="margin-bottom:6px;">LifeOS</h1>
      <p style="margin:0; font-weight:bold;">Good Morning, Harshad</p>
      <p style="margin-top:4px; color:#666;">Today’s plan • <span id="todayDate"></span></p>
    </div>

    <div class="card">
      <h2 onclick="toggleSection('importantTasks')" style="cursor:pointer;">⭐ Important Today ˅</h2>
      <div id="importantTasks"></div>
    </div>

    <div class="card">
      <h2 onclick="toggleSection('dailyTasks')" style="cursor:pointer;">• Daily Flow ˅</h2>
      <div id="dailyTasks"></div>
    </div>

    <div class="card">
      <h2 onclick="toggleSection('smallTasks')" style="cursor:pointer;">⚪ Small Things ˅</h2>
      <div id="smallTasks"></div>
    </div>

    <div class="card">
      <h2>Today Summary</h2>
      <div class="summary">
        <span>Completed</span>
        <span id="completedCount">0 / 0</span>
      </div>
      <br>
      <div class="summary">
        <span>Important Done</span>
        <span id="importantCount">0 / 0</span>
      </div>
    </div>

    <div class="button" onclick="toggleForm()">+ Add Task</div>
    <div class="button" onclick="showHistory()">View History</div>

    <div class="card add-form" id="historyBox">
      <h2>History</h2>
      <div id="historyContent"></div>
    </div>
    
    <div class="card add-form" id="addForm">
      <h2>Add New Task</h2>

      <input type="text" id="taskName" placeholder="Task name">
      <input type="time" id="plannedTime">

      <select id="taskCategory">
        <option value="important">Important Today</option>
        <option value="daily">Daily Flow</option>
        <option value="small">Small Things</option>
      </select>

      <button class="save-button" onclick="addTask()">Save Task</button>
    </div>

  </div>

  <script>
    
    let savedDate = localStorage.getItem('lifeosDate');
    let today = getTodayISO();

    if (savedDate !== today) {
      let oldTasks = JSON.parse(localStorage.getItem('lifeosTasks')) || [];

      oldTasks = oldTasks.map(task => {
        if (task.status === 'pending') {
          return { ...task, status: 'missed', completed: false };
        }
        return task;
      });

      let history = JSON.parse(localStorage.getItem('lifeosHistory')) || [];

      history.push({
        date: savedDate,
        tasks: oldTasks
      });

      localStorage.setItem('lifeosHistory', JSON.stringify(history));
      localStorage.setItem('lifeosTasks', JSON.stringify(oldTasks));
      localStorage.setItem('lifeosDate', today);
      // localStorage.removeItem('lifeosTasks');
    }

    let tasks = JSON.parse(localStorage.getItem('lifeosTasks')) || [
      { name: 'Workout', category: 'important', status: 'pending', completed: false, plannedTime: null, actualTime: null },
      { name: 'Study CFA', category: 'important',status: 'pending', completed: false, plannedTime: null, actualTime: null },
      { name: 'Wake up', category: 'daily',status: 'pending', completed: false, plannedTime: null, actualTime: null },
      { name: 'Get ready', category: 'daily',status: 'pending', completed: false, plannedTime: null, actualTime: null },
      { name: 'Prayer', category: 'daily',status: 'pending', completed: false, plannedTime: null, actualTime: null },
      { name: 'Perfume', category: 'small',status: 'pending', completed: false, plannedTime: null, actualTime: null },
      { name: 'Sunscreen', category: 'small',status: 'pending', completed: false, plannedTime: null, actualTime: null },
      { name: 'Mint / Chewing gum', category: 'small',status: 'pending', completed: false, plannedTime: null, actualTime: null }
    ];

    function saveTasks() {
      localStorage.setItem('lifeosTasks', JSON.stringify(tasks));
    }

    function getCurrentTime() {
      const now = new Date();
      return now.toLocaleTimeString([], {
        hour: 'numeric',
        minute: '2-digit',
        hour12: false
      });
    }

    function renderTasks() {
      document.getElementById('importantTasks').innerHTML = '';
      document.getElementById('dailyTasks').innerHTML = '';
      document.getElementById('smallTasks').innerHTML = '';

      tasks.forEach((task, index) => {
        const taskDiv = document.createElement('div');
        taskDiv.className = 'task';
        if (task.completed) {
          taskDiv.classList.add('completed');
        }

     
        taskDiv.innerHTML = `
          <div class="task-title">
            <span onclick="completeTask(${index})" style="cursor:pointer;">
              ${task.status === 'completed' ? '✅' : task.status === 'missed' ? '❌' : '☐'}
            </span>
            ${task.name}
          </div>
          <div class="task-meta">
            Planned: ${task.plannedTime || '—'} • 
            Actual: ${task.actualTime || '—'}
          </div>
          ${task.status === 'completed' ? `<div class="task-meta" onclick="editActualTime(event, ${index})">Edit time</div>` : ''}
          <div style="font-size:12px; color:red; cursor:pointer;" onclick="deleteTask(event, ${index})">Delete</div>
        `;

        if (task.category === 'important') {
          document.getElementById('importantTasks').appendChild(taskDiv);
        } else if (task.category === 'daily') {
          document.getElementById('dailyTasks').appendChild(taskDiv);
        } else {
          document.getElementById('smallTasks').appendChild(taskDiv);
        }
      });

      updateSummary();
    }

    function completeTask(index) {
      if (tasks[index].completed) {
        return;
      }

      tasks[index].status = 'completed';
      tasks[index].completed = true;
      tasks[index].actualTime = getCurrentTime();

      saveTasks();
      renderTasks();
    }

    function updateSummary() {
      const completedTasks = tasks.filter(task => task.completed).length;
      const importantTasks = tasks.filter(task => task.category === 'important');
      const completedImportantTasks = importantTasks.filter(task => task.completed).length;

      document.getElementById('completedCount').textContent =
        completedTasks + ' / ' + tasks.length;

      document.getElementById('importantCount').textContent =
        completedImportantTasks + ' / ' + importantTasks.length;
    }

    function toggleForm() {
      const form = document.getElementById('addForm');
      form.style.display = form.style.display === 'block' ? 'none' : 'block';
    }

    function addTask() {
      const name = document.getElementById('taskName').value.trim();
      const category = document.getElementById('taskCategory').value;
      const plannedTime = document.getElementById('plannedTime').value;

      if (name === '') {
        alert('Please enter a task name');
        return;
      }

      tasks.push({
        name: name,
        category: category,
        status: 'pending',
        completed: false,
        plannedTime: plannedTime || null,
        actualTime: null
      });

      document.getElementById('taskName').value = '';
      document.getElementById('taskCategory').value = 'important';
      document.getElementById('addForm').style.display = 'none';

      saveTasks();
      renderTasks();
    }

    function editActualTime(event, index) {
      event.stopPropagation();

      const newTime = prompt('Enter actual completion time (example: 19:30)');

      if (!newTime) {
        return;
      }

      tasks[index].actualTime = newTime;
      saveTasks();
      renderTasks();
    }

    function deleteTask(event, index) {
      event.stopPropagation();

      const confirmDelete = confirm('Delete this task?');

      if (!confirmDelete) {
        return;
      }

      tasks.splice(index, 1);
      saveTasks();
      renderTasks();
    }

    function showHistory() {
      const historyBox = document.getElementById('historyBox');
      const historyContent = document.getElementById('historyContent');

      const history = JSON.parse(localStorage.getItem('lifeosHistory')) || [];

      if (history.length === 0) {
        historyContent.innerHTML = 'No history yet';
        return;
      }

      let html = '';

      history.slice().reverse().forEach(day => {
        html += `<div style="margin-bottom:10px;">
          <strong>${day.date}</strong><br/>
          ${day.tasks.map(task => {
            const icon = task.status === 'completed' ? '✅' : task.status === 'missed' ? '❌' : '☐';
            return `${icon} ${task.name}<br/>`;
          }).join('')}
        </div>`;
      });

      historyContent.innerHTML = html;

      historyBox.style.display = 'block';
    }
    
    function toggleSection(sectionId) {
      const section = document.getElementById(sectionId);

      if (section.style.display === 'none') {
         section.style.display = 'block';
       } else {
         section.style.display = 'none';
       }
    }

    function getTodayISO() {
      const today = new Date();

      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, '0');
      const day = String(today.getDate()).padStart(2, '0');

      return `${year}-${month}-${day}`;
    }

    function showTodayDate() {
      const today = new Date();

      const day = String(today.getDate()).padStart(2, '0');
      const month = String(today.getMonth() + 1).padStart(2, '0');
      const year = today.getFullYear();

      document.getElementById('todayDate').textContent = `${day}/${month}/${year}`;
    }

    showTodayDate();
    
      renderTasks();
  </script>
</body>
</html>
